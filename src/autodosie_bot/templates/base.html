<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ site_name }}{% endblock %}</title>
    <meta name="description" content="Проверка автомобиля по VIN и госномеру с единым отчетом из бесплатных открытых источников.">
    <link rel="icon" type="image/svg+xml" href="{{ request.url_for('static', path='/favicon.svg') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700;800&family=Unbounded:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ request.url_for('static', path='/site.css') }}">
  </head>
  <body class="page-{{ active_page }}">
    <div class="site-background" aria-hidden="true">
      <div class="site-background-glow"></div>
      <div class="site-background-grid"></div>
      <div class="site-background-rings"></div>
      <div class="site-background-noise"></div>
    </div>

    <div class="site-frame">
      <header class="site-header">
        <a class="brand" href="/">
          <span class="brand-mark">AD</span>
          <span class="brand-copy">
            <strong>{{ site_name }}</strong>
            <span>Автодосье по открытым источникам</span>
          </span>
        </a>
      </header>

      <main class="page-content">
        {% block content %}{% endblock %}
      </main>

      <footer class="site-footer">
        <div class="footer-intro">
          <p class="footer-label">AutoDosie</p>
          <strong>{{ site_name }}</strong>
          <p>Проверка автомобиля по VIN и госномеру с единым понятным маршрутом.</p>
        </div>
        <div class="footer-links">
          <a href="/">Главная</a>
          <a href="mailto:{{ support_email }}">{{ support_email }}</a>
        </div>
      </footer>
    </div>
  </body>
</html>
